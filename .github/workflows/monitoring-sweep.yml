name: Monitoring Sweep

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitoring-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required configuration
        env:
          MONITORING_SITE_URL: ${{ vars.MONITORING_SITE_URL }}
          MONITORING_CRON_SECRET: ${{ secrets.MONITORING_CRON_SECRET }}
        run: |
          if [ -z "$MONITORING_SITE_URL" ]; then
            echo "Missing repository variable MONITORING_SITE_URL"
            exit 1
          fi

          if [ -z "$MONITORING_CRON_SECRET" ]; then
            echo "Missing repository secret MONITORING_CRON_SECRET"
            exit 1
          fi

      - name: Trigger monitoring sweep
        env:
          MONITORING_SITE_URL: ${{ vars.MONITORING_SITE_URL }}
          MONITORING_CRON_SECRET: ${{ secrets.MONITORING_CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer $MONITORING_CRON_SECRET" \
            "${MONITORING_SITE_URL%/}/api/monitor/run"
